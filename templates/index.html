<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Token vs NCU Demo</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#081224,#0f172a,#1e293b);
  color:white;
  min-height:100vh;
  padding:36px;
}

h1{
  font-size:54px;
  font-weight:800;
  margin-bottom:28px;
  text-align:center;
}

.top{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:26px;
  justify-content:center;
}

select,button{
  padding:14px 18px;
  border:none;
  border-radius:14px;
  font-size:15px;
}

select{
  min-width:260px;
  background:#1e293b;
  color:white;
}

button{
  background:#2563eb;
  color:white;
  font-weight:700;
  cursor:pointer;
}

button:hover{
  opacity:.92;
}

.headline{
  font-size:28px;
  font-weight:800;
  color:#93c5fd;
  margin-bottom:18px;
  text-align:center;
}

.middle{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  gap:20px;
  align-items:center;
  margin-bottom:24px;
}

.midBox{
  background:rgba(255,255,255,.06);
  padding:18px;
  border-radius:18px;
}

.midLabel{
  font-size:12px;
  color:#94a3b8;
  margin-bottom:8px;
}

.midVal{
  font-size:34px;
  font-weight:800;
}

.vs{
  font-size:28px;
  font-weight:900;
  color:#60a5fa;
  text-align:center;
  line-height:1.2;
}

.vsSub{
  font-size:13px;
  color:#94a3b8;
  font-weight:500;
  margin-top:8px;
}

.midInsight{
  text-align:center;
  color:#cbd5e1;
  font-size:15px;
  margin-top:-8px;
  margin-bottom:26px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:24px;
}

.card{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);
  border-radius:24px;
  padding:26px;
}

.win{
  box-shadow:0 0 0 2px #22c55e inset;
}

.model{
  font-size:36px;
  font-weight:800;
  margin-bottom:18px;
}

.metrics{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  margin-bottom:18px;
}

.metric{
  background:rgba(255,255,255,.05);
  border-radius:16px;
  padding:16px;
}

.label{
  font-size:12px;
  color:#94a3b8;
  margin-bottom:8px;
}

.val{
  font-size:42px;
  font-weight:800;
}

.prompt{
  background:rgba(255,255,255,.04);
  padding:18px;
  border-radius:16px;
  min-height:170px;
  line-height:1.5;
  color:#e5e7eb;
}

@media(max-width:980px){
  .grid{grid-template-columns:1fr;}
  .middle{grid-template-columns:1fr;}
  h1{font-size:40px;}
}
</style>
</head>

<body>

<h1>Token vs NCU Demo</h1>

<div class="top">
<select id="scenario">
<option value="same_tokens">Same Tokens → Different Compute</option>
<option value="diff_tokens">Different Tokens → Same Compute</option>
<option value="model">Same Compute → Different Models</option>
</select>

<select id="task">
<option value="simple">Simple</option>
<option value="reasoning">Reasoning</option>
<option value="multi">Multi-Step</option>
<option value="agentic">Agentic</option>
</select>

<button onclick="runDemo()">Run Comparison</button>
</div>

<div class="headline" id="headline">Ready</div>

<div class="middle">
<div class="midBox">
<div class="midLabel">TOKEN DIFFERENCE</div>
<div class="midVal" id="gapTokens">0</div>
</div>

<div class="vs">
  TOKENS vs COMPUTE
  <div class="vsSub">Same words can need more processing</div>
</div>

<div class="midBox">
<div class="midLabel">COMPUTE DIFFERENCE</div>
<div class="midVal" id="gapNcu">0</div>
</div>
</div>
<div class="midInsight" id="midInsight">
Token counts may look identical while compute effort changes significantly.
</div>

<div class="grid">

<div class="card" id="leftCard">
<div class="model" id="l_model">Left</div>

<div class="metrics">
<div class="metric">
<div class="label">TOKENS</div>
<div class="val" id="l_tokens">0</div>
</div>

<div class="metric">
<div class="label">NCU</div>
<div class="val" id="l_ncu">0</div>
</div>
</div>

<div class="prompt" id="l_prompt">Awaiting comparison...</div>
</div>

<div class="card" id="rightCard">
<div class="model" id="r_model">Right</div>

<div class="metrics">
<div class="metric">
<div class="label">TOKENS</div>
<div class="val" id="r_tokens">0</div>
</div>

<div class="metric">
<div class="label">NCU</div>
<div class="val" id="r_ncu">0</div>
</div>
</div>

<div class="prompt" id="r_prompt">Awaiting comparison...</div>
</div>

</div>

<script>
function animateValue(id,endValue,decimals=0){
  const el=document.getElementById(id);
  const start=0;
  const duration=700;
  let startTime=null;

  function frame(t){
    if(!startTime) startTime=t;
    const progress=Math.min((t-startTime)/duration,1);
    const val=start+(endValue-start)*progress;
    el.innerText=Number(val).toFixed(decimals);
    if(progress<1) requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
}

async function runDemo(){
  const scenario=document.getElementById("scenario").value;
  const task=document.getElementById("task").value;

  const res=await fetch("/run",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({scenario,task})
  });

  const d=await res.json();

  document.getElementById("headline").innerText=d.headline;

  document.getElementById("l_model").innerText=d.left.model;
  document.getElementById("r_model").innerText=d.right.model;

  document.getElementById("l_prompt").innerText=d.left.prompt;
  document.getElementById("r_prompt").innerText=d.right.prompt;

  animateValue("l_tokens", d.left.tokens, 0);
  animateValue("r_tokens", d.right.tokens, 0);

  animateValue("l_ncu", d.left.ncu, 2);
  animateValue("r_ncu", d.right.ncu, 2);

  const tokenGap=Math.abs(d.left.tokens-d.right.tokens);
  const ncuGap=Math.abs(d.left.ncu-d.right.ncu);

  if(tokenGap === 0 && ncuGap > 0){
    document.getElementById("midInsight").innerText =
      "Same token output, but compute usage increased.";
  }
  else if(tokenGap > 0 && ncuGap === 0){
    document.getElementById("midInsight").innerText =
      "Different token counts, but compute demand stayed stable.";
  }
  else{
    document.getElementById("midInsight").innerText =
      "Both token count and compute changed.";
  }

  animateValue("gapTokens", tokenGap, 0);
  animateValue("gapNcu", ncuGap, 2);

  document.getElementById("leftCard").classList.remove("win");
  document.getElementById("rightCard").classList.remove("win");

  if(d.left.ncu < d.right.ncu){
    document.getElementById("leftCard").classList.add("win");
  }else if(d.right.ncu < d.left.ncu){
    document.getElementById("rightCard").classList.add("win");
  }
}
</script>

</body>
</html>
