<!doctype html>
<html>
<head>
  <title>Token vs Compute</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f1117;
      color: #e6e6e6;
      margin: 0;
      padding: 40px;
      text-align: center;
    }

    h1 {
      margin-bottom: 5px;
      font-size: 28px;
    }

    .sub {
      color: #888;
      font-size: 14px;
      margin-bottom: 25px;
    }

    select, button {
      padding: 10px;
      margin: 5px;
      font-size: 14px;
      background: #1a1d25;
      border: 1px solid #2a2f3a;
      color: white;
      border-radius: 6px;
    }

    button {
      cursor: pointer;
      background: #2563eb;
    }

    .prompt {
      margin: 20px auto;
      max-width: 700px;
      text-align: left;
      font-size: 14px;
      color: #aaa;
    }

    .prompt b {
      color: white;
    }

    .insight {
      font-size: 20px;
      margin: 15px 0;
      color: #ff6b6b;
      font-weight: bold;
    }

    .grid {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 20px;
    }

    .card {
      width: 220px;
    }

    .tokens {
      font-size: 18px;
      color: #bbb;
    }

    .ncu {
      font-size: 36px;
      font-weight: bold;
      margin: 10px 0;
    }

    .low { color: #22c55e; }
    .high { color: #ef4444; }
    .neutral { color: #ccc; }

    .meta {
      font-size: 12px;
      color: #888;
      margin-top: 10px;
      line-height: 1.4;
    }
  </style>
</head>

<body>

<h1>Token vs Compute</h1>
<div class="sub">
  Controlled demo showing where token-based measurement fails
</div>

<select id="scenario">
  <option value="A">Same tokens vs different work</option>
  <option value="B">Different tokens vs same work</option>
</select>

<select id="model">
  <option value="chatgpt">ChatGPT</option>
  <option value="claude">Claude</option>
  <option value="gemini">Gemini</option>
</select>

<select id="query">
  <option value="simple">Simple</option>
  <option value="average">Average</option>
  <option value="multi">Multi-step</option>
  <option value="agentic">Agentic</option>
</select>

<br>

<button onclick="runDemo()">Run</button>

<div class="prompt">
  <b>Prompt:</b>
  <div id="prompt"></div>
</div>

<div class="prompt">
  <b>Response:</b>
  <div id="response"></div>
</div>

<div id="insight" class="insight"></div>

<div id="output" class="grid"></div>

<script>
async function runDemo() {

  const payload = {
    scenario: document.getElementById("scenario").value,
    model: document.getElementById("model").value,
    query: document.getElementById("query").value
  };

  const res = await fetch("/run", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(payload)
  });

  const data = await res.json();

  document.getElementById("prompt").textContent = data.prompt || "";
  document.getElementById("response").textContent = data.response || "";
  document.getElementById("insight").textContent = data.insight || "";

  if (!data.workflow_1 || !data.workflow_2) {
    console.error("Invalid response:", data);
    return;
  }

  const w1 = data.workflow_1;
  const w2 = data.workflow_2;

  function getClass(a, b) {
    if (Math.abs(a - b) < 0.2) return "neutral";
    return a > b ? "high" : "low";
  }

  function card(w, other) {
    return `
      <div class="card">
        <div class="tokens">${w.tokens} tokens</div>

        <div class="ncu ${getClass(w.ncu, other)}">
          ${w.ncu} NCU
        </div>

        <div class="meta">
          calls: ${w.details.model_calls}<br>
          retries: ${w.details.retries}<br>
          tools: ${w.details.tool_calls}<br>
          branching: ${w.details.branching}
        </div>
      </div>
    `;
  }

  document.getElementById("output").innerHTML =
    card(w1, w2.ncu) + card(w2, w1.ncu);
}
</script>

</body>
</html>
